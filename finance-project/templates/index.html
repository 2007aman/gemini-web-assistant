<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<nav class="navbar navbar-dark bg-dark shadow">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">Aman's Finance Tracker</span>
    </div>
</nav>

<div class="container mt-4">
    <div class="row">
        <div class="col-md-4">
            <div class="card text-white bg-success mb-3">
                <div class="card-body text-center">
                    <h5 class="card-title">Total Income</h5>
                    <h3 id="total-income">₹0</h3>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-danger mb-3">
                <div class="card-body text-center">
                    <h5 class="card-title">Total Expense</h5>
                    <h3 id="total-expense">₹0</h3>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <canvas id="myChart" width="100" height="100"></canvas>
        </div>
    </div>

    <div class="card mt-4">
        <div class="card-header">Add Transaction</div>
        <div class="card-body">
            <form id="transaction-form" class="row g-3">
                <div class="col-md-4"><input type="number" class="form-control" id="amount" placeholder="Amount" required></div>
                <div class="col-md-4">
                    <select class="form-select" id="type">
                        <option value="Income">Income</option>
                        <option value="Expense">Expense</option>
                    </select>
                </div>
                <div class="col-md-4"><button type="submit" class="btn btn-primary w-100">Add</button></div>
            </form>
        </div>
    </div>
</div>
<script src ="chart.js"></script>
</html>
